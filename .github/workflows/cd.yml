name: CD — Release APK

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Ensure debug keystore exists
        run: |
          if [ ! -f ~/.android/debug.keystore ]; then
            keytool -genkey -v \
              -keystore ~/.android/debug.keystore \
              -alias androiddebugkey \
              -storepass android \
              -keypass android \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Sign APK with debug keystore
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          APK_NAME="BookBuddy-${VERSION}-android.apk"
          APKSIGNER=$(find $ANDROID_HOME/build-tools -name apksigner | tail -1)
          $APKSIGNER sign \
            --ks ~/.android/debug.keystore \
            --ks-pass pass:android \
            --ks-key-alias androiddebugkey \
            --key-pass pass:android \
            --out "app/build/outputs/apk/release/${APK_NAME}" \
            app/build/outputs/apk/release/app-release-unsigned.apk
          echo "APK_NAME=${APK_NAME}" >> $GITHUB_ENV

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/${{ env.APK_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
